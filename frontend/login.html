<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign in — PixelPull</title>
  <link rel="stylesheet" href="/css/style.css">
  <style>
    body {
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    .auth-wrap {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 3rem 1rem;
    }

    .auth-box {
      width: 100%;
      max-width: 380px;
    }

    .auth-box h2 {
      margin-bottom: 0.4rem;
    }

    .auth-box .auth-sub {
      color: var(--muted);
      font-size: 0.875rem;
      margin-bottom: 2rem;
    }

    .auth-form {
      display: flex;
      flex-direction: column;
      gap: 1.1rem;
    }

    .auth-toggle {
      margin-top: 1.5rem;
      font-size: 0.85rem;
      color: var(--muted);
      text-align: center;
    }

    .auth-toggle button {
      background: none;
      border: none;
      color: var(--accent);
      cursor: pointer;
      font-size: inherit;
      font-family: inherit;
      padding: 0;
      text-decoration: underline;
      text-underline-offset: 3px;
    }

    .auth-submit {
      width: 100%;
      margin-top: 0.5rem;
      justify-content: center;
    }

    .err-msg {
      font-size: 0.8rem;
      color: var(--red);
      display: none;
    }
    .err-msg.show { display: block; }
  </style>
</head>
<body>
  <nav>
    <a href="/" class="nav-logo">
      <span class="dot"></span> PixelPull
    </a>
    <div class="nav-links">
      <a href="/search.html">Find my photos</a>
    </div>
  </nav>

  <div class="auth-wrap">
    <div class="auth-box">
      <h2 id="auth-title">Sign in</h2>
      <p class="auth-sub" id="auth-sub">Welcome back. Upload and manage your event photos.</p>

      <form class="auth-form" id="auth-form" onsubmit="handleSubmit(event)">
        <!-- Register only -->
        <div class="field" id="field-email" style="display:none">
          <label for="email">Email</label>
          <input type="email" id="email" placeholder="you@example.com" autocomplete="email">
        </div>

        <div class="field">
          <label for="username">Username</label>
          <input type="text" id="username" placeholder="satish" required autocomplete="username">
        </div>

        <div class="field">
          <label for="password">Password</label>
          <input type="password" id="password" placeholder="••••••••" required autocomplete="current-password">
        </div>

        <div class="err-msg" id="err-msg"></div>

        <button type="submit" class="btn btn-primary btn-lg auth-submit" id="submit-btn">
          Sign in
        </button>
      </form>

      <div class="auth-toggle">
        <span id="toggle-text">Don't have an account?</span>
        <button onclick="toggleMode()" id="toggle-btn">Create one</button>
      </div>
    </div>
  </div>

  <div id="toast"></div>
  <script src="/js/app.js"></script>
  <script>
    // If already logged in, go to dashboard
    if (isLoggedIn()) window.location.href = '/dashboard.html';

    let mode = 'login'; // 'login' | 'register'

    function toggleMode() {
      mode = mode === 'login' ? 'register' : 'login';
      const isReg = mode === 'register';

      document.getElementById('auth-title').textContent  = isReg ? 'Create account' : 'Sign in';
      document.getElementById('auth-sub').textContent    = isReg ? 'Sign up to start uploading event photos.' : 'Welcome back. Upload and manage your event photos.';
      document.getElementById('submit-btn').textContent  = isReg ? 'Create account' : 'Sign in';
      document.getElementById('toggle-text').textContent = isReg ? 'Already have an account?' : "Don't have an account?";
      document.getElementById('toggle-btn').textContent  = isReg ? 'Sign in' : 'Create one';
      document.getElementById('field-email').style.display = isReg ? '' : 'none';
      hideErr();
    }

    function showErr(msg) {
      const el = document.getElementById('err-msg');
      el.textContent = msg;
      el.classList.add('show');
    }

    function hideErr() {
      document.getElementById('err-msg').classList.remove('show');
    }

    async function handleSubmit(e) {
      e.preventDefault();
      hideErr();

      const btn = document.getElementById('submit-btn');
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;

      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span>';

      try {
        if (mode === 'register') {
          const email = document.getElementById('email').value.trim();
          const { ok, data } = await API.register(username, email, password);
          if (!ok) { showErr(data.message || 'Registration failed'); return; }
          showToast('Account created. Signing in...', 'success');
          // Auto-login after register
          await doLogin(username, password);
        } else {
          await doLogin(username, password);
        }
      } finally {
        btn.disabled = false;
        btn.textContent = mode === 'register' ? 'Create account' : 'Sign in';
      }
    }

    async function doLogin(username, password) {
      const { ok, data } = await API.login(username, password);
      if (!ok || !data.jwt) {
        showErr(data.message || 'Invalid username or password');
        return;
      }
      saveAuth(data.jwt, username);
      window.location.href = '/dashboard.html';
    }
  </script>
</body>
</html>
