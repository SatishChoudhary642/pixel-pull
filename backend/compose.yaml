services:
  pgvector:
    image: 'postgres:16'
    environment:
      - 'POSTGRES_DB=mydatabase'
      - 'POSTGRES_PASSWORD=secret'
      - 'POSTGRES_USER=myuser'
    labels:
      - "org.springframework.boot.service-connection=postgres"
    ports:
      - '5432:5432'

  worker:
    build:
      context: ../worker
      dockerfile: Dockerfile
    environment:
      - 'DB_HOST=pgvector'
      - 'DB_NAME=mydatabase'
      - 'DB_USER=myuser'
      - 'DB_PASS=secret'
      # Port the face_extractor HTTP server listens on inside the container
      - 'EXTRACTOR_PORT=8090'
    depends_on:
      - pgvector
    restart: always
    volumes:
      - ./uploads:/var/pixelpull/uploads
    ports:
      # Expose the face_extractor HTTP microservice so the Spring Boot API can call it.
      # Spring Boot (running on the host) reaches it at http://localhost:8090
      - '8090:8090'
