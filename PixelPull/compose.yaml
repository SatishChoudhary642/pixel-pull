services:
  pgvector:
    image: 'pgvector/pgvector:pg16'
    environment:
      - 'POSTGRES_DB=mydatabase'
      - 'POSTGRES_PASSWORD=secret'
      - 'POSTGRES_USER=myuser'
    labels:
      - "org.springframework.boot.service-connection=postgres"
    ports:
      - '5432:5432'

  worker:
    build:
      context: ../worker
      dockerfile: Dockerfile
    environment:
      - 'DB_HOST=pgvector'
      - 'DB_NAME=mydatabase'
      - 'DB_USER=myuser'
      - 'DB_PASS=secret'
    depends_on:
      - pgvector
    volumes:
      - ./uploads:/var/pixelpull/uploads
