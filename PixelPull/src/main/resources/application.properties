spring.application.name=PixelPull

# Database Connection (Matches compose.yaml)
spring.datasource.url=jdbc:postgresql://localhost:5432/mydatabase
spring.datasource.username=myuser
spring.datasource.password=secret

# JPA Settings
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.sql.init.mode=always

# File Upload Settings
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=50MB
app.upload.dir=./uploads

# Server Port
server.port=8080

# JWT Configuration
# This must be a Base64-encoded string of at least 256 bits (32+ characters)
jwt.secret=cGl4ZWxwdWxsLXNlY3JldC1rZXktZm9yLWp3dC1zaWduaW5nLTIwMjY=
jwt.expiration=36000000

