spring.application.name=PixelPull

# Database Connection (Matches compose.yaml)
spring.datasource.url=jdbc:postgresql://localhost:5432/mydatabase?options=-c%20TimeZone=UTC
spring.datasource.username=myuser
spring.datasource.password=secret

# JPA Settings
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.sql.init.mode=always

# File Upload Settings
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=50MB
app.upload.dir=./uploads
# Path to the directory containing compose.yaml (defaults to current dir — set to ../ when running from backend/)
app.compose.dir=./

# Server Port
server.port=8081

# JWT Configuration
# This must be a Base64-encoded string of at least 256 bits (32+ characters)
jwt.secret=cGl4ZWxwdWxsLXNlY3JldC1rZXktZm9yLWp3dC1zaWduaW5nLTIwMjY=
jwt.expiration=36000000

# Disable spring-boot-docker-compose auto-start
# We start Docker manually via: docker compose up -d
spring.docker.compose.enabled=false

# CORS Configuration
# Comma-separated list of allowed frontend origins
app.cors.allowed-origins=http://localhost:5173,http://localhost:3000
